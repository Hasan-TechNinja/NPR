{% extends "base.html" %}
{% load static %}
{% block title %}Product Details{% endblock title %}

{% block content %}
<div class="container mx-auto my-12 px-2">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 bg-white shadow-md rounded-lg p-6">
        <!-- Product Image Section -->
        <div class="flex justify-center">
            <img 
                class="w-full max-h-96 object-contain rounded-md ring-2 ring-gray-200"
                src="{{ product.image.url }}" 
                alt="{{ product.name }}">
        </div>

        <!-- Product Details Section -->
        <div class="flex flex-col space-y-6">
            <!-- Product Name -->
            <h1 class="text-xl md:text-2xl font-bold text-gray-800">{{ product.name }}</h1>

            <!-- Product Price -->
            <h2 class="text-xl md:text-2xl font-semibold text-blue-600">{{ product.price }} TK</h2>

            <!-- Product Description -->
            <p class="text-gray-700 leading-relaxed text-justify">{{ product.description }}</p>

            <!-- Action Buttons -->
            <div class="flex space-x-4">
                <!-- Back to Products Button -->
                <a href="{% url 'product' %}" 
                   class="bg-gray-300 hover:bg-gray-400 text-gray-800 py-2 px-6 rounded-md transition duration-200">
                    Back to Products
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
